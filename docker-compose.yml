version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: nutrition-db
    environment:
      POSTGRES_DB: nutritiondb
      POSTGRES_USER: nutrition
      POSTGRES_PASSWORD: nutrition123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrition -d nutritiondb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: nutrition-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nutritiondb
      SPRING_DATASOURCE_USERNAME: nutrition
      SPRING_DATASOURCE_PASSWORD: nutrition123
      APP_UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: nutrition-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
